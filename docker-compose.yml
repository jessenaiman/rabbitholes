version: '3.8'
services:
  rabbitholes:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - SERVICE_FQDN_RABBITHOLES_3000  # Coolify auto-injects domain here
      - REACT_APP_API_URL=${SERVICE_FQDN_RABBITHOLES_3000}/api 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Coolify handles ports via reverse proxy - no need to publish
    # Volumes not required for static builds