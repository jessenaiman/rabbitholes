version: '3.8'
services:
  rabbitholes:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      # Use Coolify's standard FQDN variable format
      - SERVICE_FQDN=/  # [1]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Add Coolify identification labels [1]
    labels:
      - coolify.managed=true
      - coolify.service=rabbitholes
    # Connect to Coolify's network [1]
    networks:
      - coolify-network

# Required network configuration [1]
networks:
  coolify-network:
    external: true