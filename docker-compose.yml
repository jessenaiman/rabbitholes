version: '3.8'
services:
  rabbitholes:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      # Coolify auto-populates these:
      - SERVICE_URL
      - SERVICE_FQDN
      - SERVICE_PORT=3000
      # React needs this transformed:
      - REACT_APP_API_URL=${SERVICE_URL}/api
    networks:
      - coolify-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  coolify-network:
    external: true